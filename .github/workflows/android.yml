name: Android CI (APK)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Optional: confirm Java presence (ubuntu-latest already has Java 17)
      - name: Check Java
        shell: bash
        run: |
          java -version
          javac -version

      - name: Install Android SDK
  shell: bash
  env:
    ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
  run: |
    set -euxo pipefail

    # Create SDK root
    mkdir -p "$ANDROID_SDK_ROOT"

    # Download & unpack cmdline-tools
    mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
    cd "$ANDROID_SDK_ROOT/cmdline-tools"
    curl -L -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
    unzip -q commandlinetools.zip
    rm -f commandlinetools.zip

    # The ZIP extracts to cmdline-tools/cmdline-tools/{bin,...}
    # We want cmdline-tools/latest/{bin,...}
    mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
    # Move the *contents* (bin, lib, etc.) into 'latest'
    mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools/"* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
    # Clean up the extra directory
    rmdir "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools"

    # Export PATH for THIS step so sdkmanager is available immediately
    export ANDROID_SDK_ROOT="$ANDROID_SDK_ROOT"
    export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"

    # Accept licenses and install required packages
    yes | sdkmanager --licenses
    sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    # Persist PATH for subsequent steps
    echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
    echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      # Provision Gradle and build WITHOUT the wrapper; target the app module
      - name: Build Debug APK (no wrapper)
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.7
          arguments: :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
